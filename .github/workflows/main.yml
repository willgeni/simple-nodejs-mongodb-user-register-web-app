
# The name of the workflow as it will appear in the "Actions" tab on GitHub
name: RegisterApp CI Pipeline

# The "on" keyword defines the events that trigger the workflow
on:
  # Specifies that this workflow runs on a "push" event
  push:
    # Limits the execution to pushes made specifically to the "main" branch
    branches: [ "main" ]

# The "jobs" section groups all the tasks to be executed
jobs:
  # Defines a specific job named "build"
  build:
    # Specifies the type of virtual machine (runner) to use (latest Ubuntu version)
    runs-on: ubuntu-latest

    # "steps" is a list of individual tasks that run sequentially within the job
    steps:
      # Step 1: Checks out the code so the runner can access it
      - name: Checkout repository  # Display name for the UI
        uses: actions/checkout@v4  # Uses the official pre-built action to clone your repo

      # Step 2: A simple test step to verify the pipeline works
      - name: Simple Log Message          # Display name for the UI
        run: echo "CI Pipeline Triggered Successfully!" # Runs a shell command to print text to the logs

